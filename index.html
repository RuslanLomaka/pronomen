<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEUTSCHE PRONOMEN ÜBUNG</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-title">
      <p>DEUTSCHE PRONOMEN ÜBUNG</p>
      <span>Ersetze Nomen durch Pronomen.</span>
    </header>

    <main>
      <details class="controls-disclosure" id="controlsDisclosure" open>
        <summary>Steuerung</summary>
        <section class="control-band" aria-label="Steuerung">
          <div>
            <h2>Modus</h2>
            <div class="button-row" id="modeButtons"></div>
            <button class="theme-toggle" id="themeToggle" type="button" aria-pressed="false" data-help="Wechselt zwischen hellem und dunklem Design.">Dunkel</button>
          </div>
          <div>
            <h2>Stufe</h2>
            <div class="level-grid" id="levelButtons"></div>
            <p class="level-description" id="levelDescription">Einfache Sätze mit Nominativ und Akkusativ.</p>
          </div>
        </section>
      </details>

      <section class="task-card" aria-live="polite">
        <div class="task-stats" aria-label="Aktuelle Punkte und Leben">
          <span>Punkte <strong id="scoreLabel">0</strong></span>
          <span>Serie <strong id="streakLabel">0</strong></span>
          <span class="heart-stat"><strong id="heartsLabel">♥ ♥ ♥</strong></span>
          <span id="timerBox" class="timer-box hidden">60s</span>
        </div>
        <div class="task-header">
          <div>
            <h2 id="originalSentence">Der Mann sieht den Hund.</h2>
          </div>
          <div id="tagList" class="tag-list"></div>
        </div>

        <div class="answers-grid" id="answerButtons" role="list"></div>
        <button class="ghost-button hint-button" id="hintButton" type="button" data-help="Zeigt einen kleinen Grammatik-Tipp. Danach gibt es weniger Punkte.">Tipp zeigen</button>
        <div class="hint-box hidden" id="hintBox"></div>

        <div class="feedback-panel hidden" id="feedbackPanel">
          <div>
            <p id="feedbackTitle" class="feedback-title"></p>
            <p id="correctAnswerText" class="correct-answer"></p>
            <p id="explanationText" class="explanation"></p>
            <ul id="caseLogicList" class="case-logic"></ul>
          </div>
          <button class="primary-button" id="nextButton" type="button">Weiter</button>
        </div>
      </section>

      <section class="game-over hidden" id="gameOverPanel" aria-live="assertive">
        <h2>Spiel vorbei</h2>
        <p id="gameOverSummary"></p>
        <div class="button-row">
          <button class="primary-button" id="restartButton" type="button" data-help="Startet die Übung neu.">Neu starten</button>
          <button class="secondary-button" id="reviewMistakesButton" type="button" data-help="Übt nur Aufgaben, die du falsch beantwortet hast.">Fehler üben</button>
        </div>
      </section>

      <section class="bottom-tools">
        <button class="secondary-button" id="resetButton" type="button" data-help="Löscht Punkte, Fehlerliste und freigeschaltete Stufen.">Fortschritt löschen</button>
        <button class="secondary-button" id="mistakeModeButton" type="button" data-help="Übt nur Aufgaben, die du falsch beantwortet hast.">Fehler üben</button>
      </section>

      <section class="weak-spots">
        <h2>Schwache Stellen</h2>
        <div id="weakSpotStats" class="weak-spot-list">Noch keine Fehler.</div>
      </section>

      <details class="cheat-sheet" id="cheatSheet">
        <summary>Pronomen-Spickzettel</summary>
        <div id="cheatSheetContent"></div>
      </details>
    </main>
  </div>

  <div class="help-tooltip hidden" id="helpTooltip" role="tooltip"></div>
  <div class="help-dialog hidden" id="helpDialog" role="dialog" aria-modal="true" aria-labelledby="helpDialogTitle">
    <div class="help-dialog-card">
      <h2 id="helpDialogTitle">Kurz erklärt</h2>
      <p id="helpDialogText"></p>
      <button class="primary-button" id="helpDialogOk" type="button">OK</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
